name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: maven
      - run: mvn clean install -DskipTests
      - run: cd test-app && mvn clean compile

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: maven
      - run: mvn clean install -DskipTests
      - name: Run dev-mode integration test
        working-directory: test-app
        run: bash test-dev-mode.sh
